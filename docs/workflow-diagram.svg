<svg viewBox="0 0 1200 1400" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions -->
  <defs>
    <!-- Gradients -->
    <linearGradient id="supervisorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="generationGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="reflectionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="rankingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="evolutionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="proximityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#30cfd0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#330867;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="metaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="observationGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a56;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6a88;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="safetyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbc2eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a6c1ee;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="storageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0c3fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8ec5fc;stop-opacity:1" />
    </linearGradient>

    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6b7280" />
    </marker>

    <!-- Drop shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1400" fill="#f9fafb"/>

  <!-- Title -->
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#1f2937">
    AI Co-Scientist Workflow
  </text>
  <text x="600" y="65" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#6b7280">
    Multi-Agent Scientific Hypothesis Generation System
  </text>

  <!-- User Input -->
  <rect x="450" y="100" width="300" height="60" rx="10" fill="#fff" stroke="#9ca3af" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1f2937">
    Research Goal (User Input)
  </text>
  <text x="600" y="145" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#6b7280">
    Description, Constraints, Preferences
  </text>

  <!-- Arrow to Supervisor -->
  <line x1="600" y1="160" x2="600" y2="200" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Supervisor Agent -->
  <rect x="350" y="200" width="500" height="100" rx="10" fill="url(#supervisorGrad)" filter="url(#shadow)"/>
  <text x="600" y="230" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">
    SUPERVISOR AGENT
  </text>
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#fff">
    Dynamic Task Queue • Weighted Agent Selection
  </text>
  <text x="600" y="267" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#fff">
    Terminal Conditions • Checkpoint/Resume • Timeout Protection
  </text>
  <text x="600" y="284" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#fff">
    Budget Enforcement (Max 2h, Cost Tracking)
  </text>

  <!-- Arrows from Supervisor to Core Agents -->
  <line x1="400" y1="300" x2="200" y2="360" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="300" x2="600" y2="360" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="800" y1="300" x2="1000" y2="360" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Generation Agent -->
  <rect x="50" y="360" width="300" height="140" rx="10" fill="url(#generationGrad)" filter="url(#shadow)"/>
  <text x="200" y="385" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">
    GENERATION
  </text>
  <text x="200" y="405" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    4 Methods:
  </text>
  <text x="200" y="423" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Literature Exploration (PubMed, S2)
  </text>
  <text x="200" y="438" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Simulated Debate
  </text>
  <text x="200" y="453" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Iterative Assumptions
  </text>
  <text x="200" y="468" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Research Expansion
  </text>
  <text x="200" y="488" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fff" opacity="0.9">
    Citation Graph • Multi-Source Merging
  </text>

  <!-- Reflection Agent -->
  <rect x="450" y="360" width="300" height="140" rx="10" fill="url(#reflectionGrad)" filter="url(#shadow)"/>
  <text x="600" y="385" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">
    REFLECTION
  </text>
  <text x="600" y="405" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    6 Review Types:
  </text>
  <text x="600" y="423" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Initial Review
  </text>
  <text x="600" y="438" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Full Review (with search)
  </text>
  <text x="600" y="453" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Deep Verification
  </text>
  <text x="600" y="468" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Observation • Simulation • Tournament
  </text>
  <text x="600" y="488" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fff" opacity="0.9">
    Correctness • Quality • Novelty • Safety
  </text>

  <!-- Ranking Agent -->
  <rect x="850" y="360" width="300" height="140" rx="10" fill="url(#rankingGrad)" filter="url(#shadow)"/>
  <text x="1000" y="385" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">
    RANKING
  </text>
  <text x="1000" y="405" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    Elo Tournament (1200 initial):
  </text>
  <text x="1000" y="423" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Pairwise Comparisons
  </text>
  <text x="1000" y="438" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Multi-Turn Debates (top-ranked)
  </text>
  <text x="1000" y="453" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Proximity-Aware Pairing
  </text>
  <text x="1000" y="468" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Win/Loss Tracking
  </text>
  <text x="1000" y="488" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fff" opacity="0.9">
    70% within-cluster, 20% cross-cluster
  </text>

  <!-- Arrows to next layer -->
  <line x1="200" y1="500" x2="200" y2="560" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="500" x2="600" y2="560" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="1000" y1="500" x2="1000" y2="560" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Evolution Agent -->
  <rect x="50" y="560" width="300" height="140" rx="10" fill="url(#evolutionGrad)" filter="url(#shadow)"/>
  <text x="200" y="585" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">
    EVOLUTION
  </text>
  <text x="200" y="605" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    7 Strategies:
  </text>
  <text x="200" y="623" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Grounding • Coherence
  </text>
  <text x="200" y="638" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Feasibility • Inspiration
  </text>
  <text x="200" y="653" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Combination • Simplification
  </text>
  <text x="200" y="668" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Out-of-Box Thinking
  </text>
  <text x="200" y="688" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fff" opacity="0.9">
    Dynamic Strategy Selection
  </text>

  <!-- Proximity Agent -->
  <rect x="450" y="560" width="300" height="140" rx="10" fill="url(#proximityGrad)" filter="url(#shadow)"/>
  <text x="600" y="585" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">
    PROXIMITY
  </text>
  <text x="600" y="605" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    Similarity Analysis:
  </text>
  <text x="600" y="623" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Cosine Similarity (embeddings)
  </text>
  <text x="600" y="638" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Clustering (threshold: 0.85)
  </text>
  <text x="600" y="653" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • De-duplication
  </text>
  <text x="600" y="668" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Graph Analysis • Theme Extraction
  </text>
  <text x="600" y="688" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fff" opacity="0.9">
    Tournament Pairing • Diversity Sampling
  </text>

  <!-- Meta-Review Agent -->
  <rect x="850" y="560" width="300" height="140" rx="10" fill="url(#metaGrad)" filter="url(#shadow)"/>
  <text x="1000" y="585" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1f2937">
    META-REVIEW
  </text>
  <text x="1000" y="605" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1f2937">
    Synthesis:
  </text>
  <text x="1000" y="623" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1f2937">
    • Pattern Analysis (debates)
  </text>
  <text x="1000" y="638" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1f2937">
    • Research Overview
  </text>
  <text x="1000" y="653" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1f2937">
    • Diversity Sampling (10 hypotheses)
  </text>
  <text x="1000" y="668" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1f2937">
    • Agent Feedback Loop
  </text>
  <text x="1000" y="688" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#1f2937" opacity="0.7">
    In-Context Learning
  </text>

  <!-- Arrows to Observation and Safety -->
  <line x1="200" y1="700" x2="350" y2="760" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="1000" y1="700" x2="850" y2="760" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Observation Review Agent -->
  <rect x="50" y="760" width="300" height="120" rx="10" fill="url(#observationGrad)" filter="url(#shadow)"/>
  <text x="200" y="785" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">
    OBSERVATION REVIEW
  </text>
  <text x="200" y="805" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    Literature Validation:
  </text>
  <text x="200" y="823" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Extract Observations from Papers
  </text>
  <text x="200" y="838" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Score Hypothesis vs Observations
  </text>
  <text x="200" y="853" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">
    • Mechanistic Alignment Check
  </text>
  <text x="200" y="870" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fff" opacity="0.9">
    Phase 6: Long-Tail Observation Coverage
  </text>

  <!-- Safety Agent -->
  <rect x="850" y="760" width="300" height="120" rx="10" fill="url(#safetyGrad)" filter="url(#shadow)"/>
  <text x="1000" y="785" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1f2937">
    SAFETY
  </text>
  <text x="1000" y="805" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1f2937">
    Guardrails:
  </text>
  <text x="1000" y="823" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1f2937">
    • Budget Enforcement ($50 AUD default)
  </text>
  <text x="1000" y="838" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1f2937">
    • Ethics Review (safety score &gt; 0.5)
  </text>
  <text x="1000" y="853" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1f2937">
    • Constraint Validation
  </text>
  <text x="1000" y="870" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#1f2937" opacity="0.7">
    Timeout Protection • Cost Tracking
  </text>

  <!-- Arrow to Storage Layer -->
  <line x1="600" y1="700" x2="600" y2="930" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Storage Layer -->
  <rect x="250" y="930" width="700" height="120" rx="10" fill="url(#storageGrad)" filter="url(#shadow)"/>
  <text x="600" y="960" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1f2937">
    STORAGE &amp; INFRASTRUCTURE LAYER
  </text>
  <text x="600" y="985" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1f2937">
    PostgreSQL (hypotheses, reviews, matches, observations) • Redis (caching, 24h papers, 7d metadata)
  </text>
  <text x="600" y="1003" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1f2937">
    ChromaDB (vector embeddings, semantic search) • LiteratureRepository (PDF parsing, citations)
  </text>
  <text x="600" y="1021" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1f2937">
    PubMed MCP • Semantic Scholar API • Tavily Search • LangSmith Tracing
  </text>
  <text x="600" y="1039" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#1f2937" opacity="0.7">
    Checkpoint/Resume • Async Adapter • Memory Cleanup
  </text>

  <!-- Arrow to Output -->
  <line x1="600" y1="1050" x2="600" y2="1110" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Output Box -->
  <rect x="200" y="1110" width="800" height="100" rx="10" fill="#fff" stroke="#9ca3af" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="1140" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1f2937">
    OUTPUTS
  </text>
  <text x="600" y="1165" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1f2937">
    • Ranked Hypotheses (Elo ratings, literature citations, experimental protocols)
  </text>
  <text x="600" y="1183" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1f2937">
    • Research Overview (patterns, directions, diverse sample, expert contacts)
  </text>
  <text x="600" y="1200" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1f2937">
    • Meta-Review (agent feedback, improvement opportunities)
  </text>

  <!-- Arrow to API/Frontend -->
  <line x1="600" y1="1210" x2="600" y2="1270" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- API/Frontend -->
  <rect x="350" y="1270" width="500" height="80" rx="10" fill="#10b981" filter="url(#shadow)"/>
  <text x="600" y="1300" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">
    REST API (FastAPI) + Frontend (React)
  </text>
  <text x="600" y="1323" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#fff">
    http://localhost:8000/docs • Chat Interface • Hypothesis Browser
  </text>
  <text x="600" y="1340" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#fff">
    Dashboard • Literature Upload • Real-time Progress Tracking
  </text>

  <!-- Legend -->
  <text x="50" y="1380" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#6b7280">
    Legend:
  </text>
  <circle cx="130" cy="1376" r="5" fill="url(#generationGrad)"/>
  <text x="145" y="1380" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Phase 1-4 Agents</text>

  <circle cx="280" cy="1376" r="5" fill="url(#observationGrad)"/>
  <text x="295" y="1380" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Phase 6 Additions</text>

  <circle cx="430" cy="1376" r="5" fill="url(#storageGrad)"/>
  <text x="445" y="1380" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Infrastructure</text>

  <text x="850" y="1380" font-family="Arial, sans-serif" font-size="8" fill="#9ca3af">
    20,680 lines Python • 28 tests • 31 data models • 98 docs
  </text>
</svg>
