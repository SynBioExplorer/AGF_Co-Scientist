name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  python-tests:
    name: Python tests (Phase 5)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-api.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install --prefer-binary -r requirements-api.txt
          pip install pytest
          echo "=== pip list ==="
          pip list

      # Diagnostic: surface ImportErrors before unittest swallows them.
      - name: Import smoke test
        run: |
          set -e
          PYTHONPATH=03_architecture:04_Scripts:. python -c "
          import sys
          for mod in (
              'src.config',
              'src.config.agent_models',
              'src.utils.paths',
              'src.utils.keychain',
              'src.storage.sqlite_store',
              'src.llm',
              'src.llm.deepseek_client',
              'src.api.setup',
              'src.api.export',
          ):
              print(f'importing {mod} ...', flush=True)
              __import__(mod)
              print(f'  OK', flush=True)
          print('all imports OK')
          "

      # Phase 1-4 tests require live API keys (Google/OpenAI/Anthropic) and
      # network access to external services, so they are not run in CI.
      # Phase 5 tests are fully self-contained (mocks for HTTP + keyring).
      - name: Run phase 5 tests
        run: |
          PYTHONPATH=03_architecture:04_Scripts:. \
            python -m unittest discover -s 05_tests -p "phase5_*_test.py" -v 2>&1

  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  electron-smoke:
    name: Electron build (smoke, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install root Node deps
        run: npm ci

      - name: Install frontend + build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # We don't build the PyInstaller sidecar in regular CI — that's
      # exercised by release.yml on tag push. This step just verifies the
      # electron-builder config and Electron toolchain are sound.
      - name: electron-builder config check
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          mkdir -p release/v0.1.0/desktop/resources/sidecar
          echo "placeholder" > release/v0.1.0/desktop/resources/sidecar/agf-coscientist-backend
          chmod +x release/v0.1.0/desktop/resources/sidecar/agf-coscientist-backend
          npx electron-builder --config release/v0.1.0/build/electron-builder.yml --linux AppImage --publish never
