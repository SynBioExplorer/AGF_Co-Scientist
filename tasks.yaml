    depends_on:
      - "task-vector-storage"
    verification:
      - command: "cd '/Users/felix/Library/CloudStorage/OneDrive-SharedLibraries-MacquarieUniversity/Australian Genome Foundry - AWS cloud infrastructure/12_AI_Co-scientist/Google co-scientist' && python -c 'from src.literature.pdf_parser import PDFParser; from src.literature.repository import PrivateRepository; print(\"OK\")'"
