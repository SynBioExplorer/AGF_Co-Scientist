# =============================================================================
# CONTRACT DEFINITIONS
# =============================================================================

contracts:
  - name: "EmbeddingClientProtocol"
    version: "3f65fb4"
    file_path: "contracts/embedding_interface.py"
    methods: ["embed", "embed_batch", "dimension"]
    consumers: ["task-vector-storage", "task-literature-processing"]

  - name: "VectorStoreProtocol"
    version: "3f65fb4"
    file_path: "contracts/vector_store_interface.py"
    methods: ["add_documents", "search", "delete", "get"]
    consumers: ["task-vector-storage", "task-literature-processing"]

  - name: "ToolProtocol"
    version: "3f65fb4"
    file_path: "contracts/tool_interface.py"
    methods: ["name", "description", "domains", "execute"]
    consumers: ["task-tool-integration"]

  - name: "TracingProtocol"
    version: "3f65fb4"
    file_path: "contracts/tracing_interface.py"
    methods: ["get_tracer", "trace_run", "log_feedback"]
    consumers: ["task-observability"]

  - name: "LiteratureProtocols"
    version: "3f65fb4"
    file_path: "contracts/literature_interface.py"
    methods: ["PDFParserProtocol", "LiteratureRepositoryProtocol"]
    consumers: ["task-literature-processing"]

  - name: "APIContracts"
    version: "3f65fb4"
    file_path: "contracts/api_interface.py"
    methods: ["DocumentUploadResponse", "PubMedSearchResponse", "SettingsResponse"]
    consumers: ["task-tool-integration", "task-literature-processing", "task-settings-api", "task-frontend"]
