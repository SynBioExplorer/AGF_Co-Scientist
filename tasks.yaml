# Phase 5D Frontend Dashboard Decomposition
# ==========================================
#
# The frontend is decomposed into 6 parallel tasks with non-overlapping file ownership.
# Each task produces a self-contained feature that can be verified independently.
#
# Dependency Graph:
#   task-a (Foundation) ─┬─> task-b (Settings)
#                        ├─> task-c (Layout)
#                        ├─> task-d (Chat)
#                        ├─> task-e (Hypotheses)
#                        └─> task-f (Literature)
#
# task-a must complete first as it sets up the project infrastructure.
# tasks b-f can run in parallel after task-a completes.

tasks:
  # ==========================================================================
  # TASK A: Foundation & Infrastructure
  # ==========================================================================
  - id: task-a
    description: |
      Set up the React frontend project with Vite, TypeScript, and Tailwind CSS.
      Create the API service layer, TypeScript types, and core hooks.
      This establishes the foundation all other tasks depend on.
    files_write:
      # Project setup
      - "frontend/package.json"
      - "frontend/vite.config.ts"
      - "frontend/tsconfig.json"
      - "frontend/tsconfig.node.json"
      - "frontend/tailwind.config.js"
      - "frontend/postcss.config.js"
      - "frontend/index.html"
      - "frontend/.env"
      - "frontend/.env.example"
      # Source entry
      - "frontend/src/main.tsx"
      - "frontend/src/index.css"
      # Types
      - "frontend/src/types/index.ts"
      - "frontend/src/types/api.ts"
      # API Service
      - "frontend/src/services/api.ts"
      # Core hooks
      - "frontend/src/hooks/useApi.ts"
      - "frontend/src/hooks/usePolling.ts"
      # Common components
      - "frontend/src/components/common/Button.tsx"
      - "frontend/src/components/common/Card.tsx"
      - "frontend/src/components/common/Loading.tsx"
      - "frontend/src/components/common/Select.tsx"
      - "frontend/src/components/common/Slider.tsx"
      - "frontend/src/components/common/Input.tsx"
      - "frontend/src/components/common/index.ts"
      # Public assets
      - "frontend/public/favicon.ico"
    files_read:
      - "src/api/main.py"
      - "src/api/models.py"
      - "03_architecture/schemas.py"
      - "03_architecture/Phase5/PHASE5D_FRONTEND_DASHBOARD.md"
    resources_write:
      - "config:vite"
      - "config:tailwind"
      - "config:typescript"
      - "service:api"
    depends_on: []
    verification:
      - command: "cd /Users/felix/Library/CloudStorage/OneDrive-SharedLibraries-MacquarieUniversity/Australian\\ Genome\\ Foundry\\ -\\ AWS\\ cloud\\ infrastructure/12_AI_Co-scientist/Google\\ co-scientist/frontend && npm install && npm run build 2>&1 | head -50"
