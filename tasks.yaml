  - id: task-reflection-refutation
    description: |
      Integrate RefutationSearchTool into ReflectionAgent.

      Implementation changes to src/agents/reflection.py:
      1. Add imports: RefutationSearchTool, LimitationsExtractor, initialize_tools, settings
      2. Update __init__:
         - Initialize tool_registry = initialize_tools()
         - Create self.refutation_tool with pubmed and semantic_scholar from registry
         - Create self.limitations_extractor
      3. Add async _search_for_refutation() method:
         - Extract core claim from hypothesis.hypothesis_statement
         - Call refutation_tool.search_contradictions()
         - Return tuple of (contradictions_list, retraction_status_dict)
      4. Add async _check_citation_retractions() method:
         - For each citation in hypothesis.literature_citations
         - Call refutation_tool.check_retractions() if has PMID
