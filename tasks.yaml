      6. Convert execute() to async:
         - If settings.enable_refutation_search:
           - Call _search_for_refutation()
           - Call _check_citation_retractions()
           - Format refutation context
         - Append refutation context to review prompt
         - Include counter-evidence section in structured_prompt

