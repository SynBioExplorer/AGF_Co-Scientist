  # ---------------------------------------------------------------------------
  # TASK 4: Literature Processing (Phase 5C)
  # ---------------------------------------------------------------------------
  - id: task-literature-processing
    description: |
      Implement PDF parsing, text chunking, citation extraction, and private
      document repository with semantic search.

      Components:
      - PDF parser using PyMuPDF
      - Text chunker (sentence-aware)
      - Citation extractor
      - Citation graph builder
      - Private repository with vector search
      - API endpoints for upload/search (router file only, integration task adds to main.py)
    files_write:
      - "src/literature/__init__.py"
      - "src/literature/pdf_parser.py"
      - "src/literature/chunker.py"
      - "src/literature/citation_extractor.py"
      - "src/literature/citation_graph.py"
      - "src/literature/repository.py"
      - "src/api/documents.py"
      - "05_tests/phase5_literature_test.py"
    files_read:
      - "src/storage/vector.py"
      - "src/embeddings/base.py"
      - "src/api/main.py"
      - "contracts/literature_interface.py"
      - "contracts/vector_store_interface.py"
      - "contracts/api_interface.py"
