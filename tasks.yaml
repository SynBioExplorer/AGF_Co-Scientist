  # Wave 2: Implement agent integrations - runs in parallel (after tests exist)
  - id: task-generation-quality
    description: |
      Integrate PaperQualityScorer and LimitationsExtractor into GenerationAgent.

      Implementation changes to src/agents/generation.py:
      1. Add imports: PaperQualityScorer, LimitationsExtractor, settings flags
      2. Initialize self.quality_scorer and self.limitations_extractor in __init__
      3. Add _enrich_papers_with_quality() method:
         - Score each paper using quality_scorer.compute_quality_score()
         - Set paper.quality_score attribute
         - Filter papers below settings.quality_min_threshold
         - Return ranked list (highest quality first)
      4. Add _extract_paper_limitations() method:
         - Use limitations_extractor.batch_extract() on papers
         - Format with format_batch_for_context()
         - Return formatted string or empty if disabled
      5. Update _format_citation_graph_context():
         - Add quality labels [QUALITY: HIGH/MEDIUM/LOW] to each paper
         - Skip papers where is_retracted=True
      6. Modify execute() method:
         - After _search_literature_tools(), call _enrich_papers_with_quality()
         - After enrichment, call _extract_paper_limitations()
         - Update literature_context to include both quality and limitations
      7. Update _validate_citations():
         - Check is_retracted flag on citation graph nodes
         - Log warning for retracted citations

    files_write:
