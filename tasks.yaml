      - "contracts/tool_interface.py"
      - "contracts/api_interface.py"
      - "03_architecture/Phase5/PHASE5B_TOOL_INTEGRATION.md"
    resources_write:
      - "module:src/tools"
      - "file:src/api/tools.py"
      - "config:pubmed_api_key"
    depends_on: []
    verification:
      - command: "cd '/Users/felix/Library/CloudStorage/OneDrive-SharedLibraries-MacquarieUniversity/Australian Genome Foundry - AWS cloud infrastructure/12_AI_Co-scientist/Google co-scientist' && python -c 'from src.tools.pubmed import PubMedTool; from src.tools.registry import ToolRegistry; print(\"OK\")'"
        type: import
        required: true
      - command: "cd '/Users/felix/Library/CloudStorage/OneDrive-SharedLibraries-MacquarieUniversity/Australian Genome Foundry - AWS cloud infrastructure/12_AI_Co-scientist/Google co-scientist' && python 05_tests/phase5_tools_test.py"
        type: test
        required: true
    patch_intents:
      - file: "src/config.py"
        action: "add_settings"
        intent:
