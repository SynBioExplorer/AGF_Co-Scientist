request: "Build Phase 5 features for the AI Co-Scientist project as a local deployment (no AWS). Phase 5 includes: Vector Storage (ChromaDB), Tool Integration (PubMed), Literature Processing (PDF parsing, chunking), Frontend Dashboard (React), and Observability (LangSmith)."
created_at: "2025-01-29T10:15:00+11:00"

# =============================================================================
# TASK DEFINITIONS
# =============================================================================

tasks:
  # ---------------------------------------------------------------------------
  # TASK 1: Vector Storage & Embeddings (Phase 5A)
  # ---------------------------------------------------------------------------
  - id: task-vector-storage
    description: |
      Implement vector embeddings and ChromaDB storage for hypothesis similarity.
      This replaces/augments the LLM-based Proximity agent with fast vector similarity.

      Components:
      - Embedding client abstraction (BaseEmbeddingClient)
      - Google embedding client (text-embedding-004)
      - OpenAI embedding client (text-embedding-3-small)
      - ChromaDB vector store implementation
      - Vector store factory
      - Update ProximityAgent to use vector similarity
      - Config updates for embedding settings
    files_write:
      - "src/embeddings/__init__.py"
      - "src/embeddings/base.py"
      - "src/embeddings/google.py"
      - "src/embeddings/openai.py"
      - "src/embeddings/factory.py"
      - "src/storage/vector.py"
      - "src/storage/vector_factory.py"
      - "05_tests/phase5_vector_test.py"
    files_read:
      - "src/storage/base.py"
      - "src/agents/proximity.py"
      - "src/config.py"
      - "src/llm/base.py"
      - "src/llm/factory.py"
      - "contracts/embedding_interface.py"
      - "contracts/vector_store_interface.py"
      - "03_architecture/Phase5/PHASE5A_VECTOR_STORAGE.md"
    resources_write:
      - "module:src/embeddings"
      - "config:embedding_provider"
      - "config:vector_store_type"
    depends_on: []
    verification:
      - command: "cd '/Users/felix/Library/CloudStorage/OneDrive-SharedLibraries-MacquarieUniversity/Australian Genome Foundry - AWS cloud infrastructure/12_AI_Co-scientist/Google co-scientist' && python -c 'from src.embeddings.base import BaseEmbeddingClient; print(\"OK\")'"
        type: import
        required: true
      - command: "cd '/Users/felix/Library/CloudStorage/OneDrive-SharedLibraries-MacquarieUniversity/Australian Genome Foundry - AWS cloud infrastructure/12_AI_Co-scientist/Google co-scientist' && python -c 'from src.storage.vector import ChromaVectorStore; print(\"OK\")'"
        type: import
        required: true
      - command: "cd '/Users/felix/Library/CloudStorage/OneDrive-SharedLibraries-MacquarieUniversity/Australian Genome Foundry - AWS cloud infrastructure/12_AI_Co-scientist/Google co-scientist' && python 05_tests/phase5_vector_test.py"
        type: test
        required: true
    patch_intents:
      - file: "src/config.py"
        action: "add_settings"
        intent:
          settings:
            - "vector_store_type: Literal['chroma', 'memory'] = 'chroma'"
            - "chroma_persist_directory: str = './chroma_data'"
            - "embedding_provider: Literal['google', 'openai'] = 'google'"
            - "google_embedding_model: str = 'text-embedding-004'"
            - "openai_embedding_model: str = 'text-embedding-3-small'"
      - file: "src/agents/proximity.py"
        action: "add_vector_support"
        intent:
          description: "Add optional vector_store and embedding_client parameters to constructor, add use_vectors flag, implement _vector_similarity and _get_embedding methods"

  # ---------------------------------------------------------------------------
  # TASK 2: Observability with LangSmith (Phase 5F)
  # ---------------------------------------------------------------------------
  - id: task-observability
    description: |
      Integrate LangSmith for LLM tracing, debugging, and cost monitoring.

      Components:
      - Tracing module with context managers and decorators
      - LLM client integration (callbacks for tracing)
      - Agent tracing decorators
      - Environment variable configuration
    files_write:
      - "src/observability/__init__.py"
      - "src/observability/tracing.py"
      - "05_tests/phase5_tracing_test.py"
    files_read:
      - "src/llm/base.py"
      - "src/llm/google.py"
      - "src/llm/openai.py"
      - "src/agents/base.py"
      - "contracts/tracing_interface.py"
      - "03_architecture/Phase5/PHASE5F_OBSERVABILITY.md"
    resources_write:
      - "module:src/observability"
      - "config:langsmith"
    depends_on: []
    verification:
      - command: "cd '/Users/felix/Library/CloudStorage/OneDrive-SharedLibraries-MacquarieUniversity/Australian Genome Foundry - AWS cloud infrastructure/12_AI_Co-scientist/Google co-scientist' && python -c 'from src.observability.tracing import get_tracer, trace_agent, LANGSMITH_ENABLED; print(f\"LangSmith enabled: {LANGSMITH_ENABLED}\")'"
        type: import
        required: true
      - command: "cd '/Users/felix/Library/CloudStorage/OneDrive-SharedLibraries-MacquarieUniversity/Australian Genome Foundry - AWS cloud infrastructure/12_AI_Co-scientist/Google co-scientist' && python 05_tests/phase5_tracing_test.py"
        type: test
        required: true
    patch_intents:
      - file: "src/llm/base.py"
        action: "add_tracing"
        intent:
          description: "Import tracing utilities, add callbacks property that includes LangSmith tracer if enabled"
      - file: "src/llm/google.py"
        action: "add_tracing"
        intent:
          description: "Pass self.callbacks to ChatGoogleGenerativeAI, add @trace_llm_call decorator to ainvoke"
      - file: "src/llm/openai.py"
        action: "add_tracing"
        intent:
          description: "Pass self.callbacks to ChatOpenAI, add @trace_llm_call decorator to ainvoke"

