  # ---------------------------------------------------------------------------
  - id: task-tool-integration
    description: |
      Implement tool framework and PubMed integration for literature research.

      Components:
      - Tool base interface (BaseTool)
      - Tool registry for domain-based selection
      - PubMed tool implementation (NCBI E-utilities)
      - API endpoint for PubMed search (router file only, integration task adds to main.py)
      - Integration with Generation agent (optional context)
    files_write:
